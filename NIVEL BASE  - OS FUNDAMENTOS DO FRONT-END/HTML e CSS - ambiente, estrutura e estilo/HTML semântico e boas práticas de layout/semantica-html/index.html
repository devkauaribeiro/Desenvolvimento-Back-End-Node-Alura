<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semântica</title>
</head>

<body>
    <!-- Cabeçalho <header>-->
    <header>
        <h1>Semântica HTML</h1>
        <p>Todo o conteúdo de cabeçalhodo site, sempre ficará denrto da tag <code>&lt;header&gt;</code> </p>

        <!-- Lista de nevagação <nav>-->
        <nav>
            <a href="#">Link 1</a>
            <a href="#">Link 2</a>
        </nav>
    </header>
    <!-- Conteúdo principal <main>-->
    <main>
        <!-- Section -->
        <section>
            <h2>Título da minha primeira sessão</h2>
            <p>Lorem ipsum dolor sit.</p>
            <a href="#">Link</a>
        </section>
        <section>
            <h2>Título da minha segunda sessão</h2>
            <p>Lorem ipsum dolor sit.</p>
            <a href="#">Link</a>
        </section>
    </main>

    <!-- Footer - Rodapé -->
    <footer>
        <p>Meu contato: <strong>11 90000-0000</strong></p>
    </footer>

    <!-- Article -->
    <article>
        <h3>Titulo Artigo</h3>
        <p>Lorem ipsum dolor sit.</p>
        <img src="../img/paisagem-480.jpg" alt="descrição imagem">
    </article>

    <!-- Figure -->
    <figure>
        <img src="../img/paisagem-480.jpg" alt="descrição imagem">
        <figcaption>Descrição da imagem</figcaption>
    </figure>
</body>

</html>
