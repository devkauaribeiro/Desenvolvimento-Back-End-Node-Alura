<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>

<body>
    <h2>Listas</h2>
    <hr>
    <p>Lista ordenada</p>
    <ol type="1" start="5"> <!-- Tipos 1, A, a, I, i || Start é o valor que quero começar a lista-->
        <li>colocar os ovos na batedeira</li>
        <li>colocar o chocolate</li>
        <li>colocar a farinha</li>
        <li>colocar o açucar</li>
        <li>colocar o leite</li>
    </ol>

    <p>Lista desordenada</p>
    <ul type="square"> <!--types: disc, circle, square-->
        <li>comprar cagé</li>
        <li>comprar pão</li>
        <li>comprar produtos de limpeza
            <ol type="a">
                <li>sabão</li>
                <li>detergente</li>
                <li>água sanitária</li>
            </ol type="a">
        </li>
    </ul>
</body>

</html>
