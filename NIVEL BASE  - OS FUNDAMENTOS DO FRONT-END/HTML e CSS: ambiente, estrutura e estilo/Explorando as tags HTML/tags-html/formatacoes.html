<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formatações</title>
</head>

<body>
    <h1>Formatações</h1>
    <hr>
    <p><b>é um texto em negrito</b> usando uma tag não semântica</p>

    <p><strong>é um texto em negrito</strong> usando uma tag semântica</p>

    <p><i>é um texto com ênfase(itálico)</i>, usando uma tag não semântica</p>

    <p><em>é um texto com ênfase(itálico)</em>, usando uma tag semântica</p>

    <p>Minha casa tem 80<sup>m2</sup></p>

    <p>A composição química da água é H<sub>2</sub>O</p>
</body>

</html>
